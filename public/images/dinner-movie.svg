<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#fef3e2"/>
  <!-- Film strip -->
  <rect x="40" y="60" width="24" height="180" rx="4" fill="#e8c9a0"/>
  <rect x="44" y="70" width="16" height="12" rx="2" fill="#fef3e2"/>
  <rect x="44" y="90" width="16" height="12" rx="2" fill="#fef3e2"/>
  <rect x="44" y="110" width="16" height="12" rx="2" fill="#fef3e2"/>
  <rect x="44" y="130" width="16" height="12" rx="2" fill="#fef3e2"/>
  <rect x="44" y="150" width="16" height="12" rx="2" fill="#fef3e2"/>
  <rect x="44" y="170" width="16" height="12" rx="2" fill="#fef3e2"/>
  <rect x="44" y="190" width="16" height="12" rx="2" fill="#fef3e2"/>
  <rect x="44" y="210" width="16" height="12" rx="2" fill="#fef3e2"/>
  <!-- Popcorn bucket -->
  <path d="M270 130 L290 230 L350 230 L370 130 Z" fill="#f5deb3" stroke="#d4a574" stroke-width="2"/>
  <path d="M265 130 L375 130" stroke="#d4a574" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="300" cy="118" rx="12" ry="14" fill="#fffbe6"/>
  <ellipse cx="320" cy="112" rx="14" ry="15" fill="#fffbe6"/>
  <ellipse cx="340" cy="118" rx="12" ry="14" fill="#fffbe6"/>
  <ellipse cx="310" cy="105" rx="11" ry="12" fill="#fff8dc"/>
  <ellipse cx="330" cy="105" rx="11" ry="12" fill="#fff8dc"/>
  <!-- Stripes on bucket -->
  <line x1="280" y1="150" x2="295" y2="225" stroke="#e8b88a" stroke-width="2"/>
  <line x1="310" y1="135" x2="310" y2="225" stroke="#e8b88a" stroke-width="2"/>
  <line x1="340" y1="135" x2="330" y2="225" stroke="#e8b88a" stroke-width="2"/>
  <!-- Movie screen -->
  <rect x="100" y="70" width="160" height="110" rx="8" fill="#fff" stroke="#d4a574" stroke-width="2"/>
  <rect x="110" y="80" width="140" height="90" rx="4" fill="#f0e6d6"/>
  <!-- Play button -->
  <polygon points="165,115 165,140 190,127" fill="#d4a574"/>
  <!-- Candle -->
  <rect x="175" y="210" width="10" height="40" rx="3" fill="#f5deb3"/>
  <ellipse cx="180" cy="208" rx="6" ry="10" fill="#ffcc66"/>
  <ellipse cx="180" cy="205" rx="3" ry="6" fill="#ffe599"/>
  <!-- Stars -->
  <circle cx="90" cy="40" r="3" fill="#e8c9a0"/>
  <circle cx="340" cy="50" r="2" fill="#e8c9a0"/>
  <circle cx="200" cy="30" r="2.5" fill="#e8c9a0"/>
  <circle cx="150" cy="260" r="2" fill="#e8c9a0"/>
  <!-- Hearts -->
  <path d="M360 270 c0-4 -6-8 -6-4 c0 4 6 8 6 8 c0 0 6-4 6-8 c0-4 -6 0 -6 4z" fill="#e8a0a0" opacity="0.6"/>
  <path d="M80 270 c0-3 -5-6 -5-3 c0 3 5 6 5 6 c0 0 5-3 5-6 c0-3 -5 0 -5 3z" fill="#e8a0a0" opacity="0.5"/>
</svg>
